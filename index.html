<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拾贝</title>
  </head>

  <body>
    <script>
      // Early error capture — buffers errors before React/debugLog loads
      window.__earlyErrors = [];
      window.addEventListener("error", function(e) {
        window.__earlyErrors.push({ type: "error", message: e.message, filename: e.filename, lineno: e.lineno, ts: Date.now() });
      });
      window.addEventListener("unhandledrejection", function(e) {
        window.__earlyErrors.push({ type: "rejection", reason: String(e.reason), ts: Date.now() });
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
