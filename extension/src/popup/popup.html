<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1 data-i18n="appTitle"></h1>
    <span id="status" class="status"></span>
  </div>

  <div id="offline-notice" class="offline-notice" style="display:none"
    data-i18n="offlineNotice"></div>

  <div id="main-content" style="display:none">
    <div class="page-info">
      <div id="page-title" class="page-title"></div>
      <div id="page-url" class="page-url"></div>
    </div>

    <div id="url-warning" class="url-warning" style="display:none"></div>

    <div id="capture-status" class="capture-status" style="display:none">
      <span id="capture-text"></span>
      <span id="capture-timer"></span>
    </div>

    <div class="field">
      <label data-i18n="labelFolder"></label>
      <select id="folder-select"></select>
    </div>

    <div class="field">
      <label data-i18n="labelTags"></label>
      <input type="text" id="tags-input" data-i18n-placeholder="tagsPlaceholder">
    </div>

    <div class="btn-group">
      <button id="save-btn" class="save-btn" disabled data-i18n="btnSaveFullPage"></button>
      <button id="select-save-btn" class="save-btn save-btn-outline" data-i18n="btnSaveRegion"></button>
    </div>

    <div id="message" class="message" style="display:none"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
