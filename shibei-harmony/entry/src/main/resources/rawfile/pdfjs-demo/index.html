<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font: 14px -apple-system, sans-serif; padding: 8px; }
  pre { max-height: 50vh; overflow: auto; background: #f0f0f0; padding: 8px; font-size: 11px; }
  canvas { width: 100%; border: 1px solid #ccc; }
</style>
</head>
<body>
<h3>pdfjs-dist Demo (dual classic-script load)</h3>
<div id="status">loading…</div>
<canvas id="page"></canvas>
<h4>Extracted text (streamTextContent):</h4>
<pre id="text">—</pre>

<!--
  Load order matters:
    1. pdf-bundle.js       -> window.pdfjsLib
    2. pdf-worker-bundle.js -> window.pdfjsWorker (via esbuild --global-name)

  pdfjs's fake-worker path checks globalThis.pdfjsWorker.WorkerMessageHandler
  FIRST; when present, it uses that handler directly on the main thread and
  never calls import(workerSrc) — which ArkWeb rejects for file:// assets.

  workerSrc must still be a non-empty string (pdfjs throws otherwise), so we
  set it to a harmless placeholder; it's never actually fetched.
-->
<script src="./pdf-bundle.js"></script>
<script src="./pdf-worker-bundle.js"></script>
<script>
(async function() {
  var host = window.shibeiHost;
  function log(o) { if (host) host.onEvent(JSON.stringify(o)); console.log(o); }
  function setStatus(s) { document.getElementById('status').textContent = s; }

  try {
    var pdfjs = window.pdfjsLib;
    var wg = window.pdfjsWorker;
    log({
      kind: 'probe',
      step: 'A: globals',
      pdfjsLib: typeof pdfjs,
      pdfjsWorker: typeof wg,
      hasHandler: !!(wg && wg.WorkerMessageHandler)
    });
    if (!pdfjs || !pdfjs.getDocument) {
      setStatus('ERR: pdfjsLib missing'); return;
    }
    if (!wg || !wg.WorkerMessageHandler) {
      setStatus('ERR: pdfjsWorker global missing');
      log({ kind: 'error', step: 'A', message: 'pdfjsWorker not set by worker bundle' });
      return;
    }

    // Satisfy pdfjs's "No workerSrc specified" guard. Value is never fetched
    // because the mainThreadWorkerMessageHandler path short-circuits import().
    pdfjs.GlobalWorkerOptions.workerSrc = 'about:blank';
    setStatus('B: workerSrc placeholder set');
    log({ kind: 'probe', step: 'B: workerSrc set' });

    const task = pdfjs.getDocument({ url: './sample.pdf' });
    setStatus('C: getDocument task created');
    log({ kind: 'probe', step: 'C: getDocument created' });

    const pdf = await task.promise;
    setStatus('D: pdf loaded, pages=' + pdf.numPages);
    log({ kind: 'probe', step: 'D: pdf loaded', pages: pdf.numPages });

    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 1.0 });
    const canvas = document.getElementById('page');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    setStatus('E: page rendered');
    log({ kind: 'probe', step: 'E: page rendered', w: viewport.width, h: viewport.height });

    const textStream = page.streamTextContent({ includeMarkedContent: false });
    const reader = textStream.getReader();
    const pieces = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      if (value && value.items) {
        for (const it of value.items) {
          if (typeof it.str === 'string') pieces.push(it.str);
        }
      }
    }
    const full = pieces.join(' ');
    document.getElementById('text').textContent = full || '(empty)';
    setStatus('extracted ' + full.length + ' chars');
    log({ kind: 'done', chars: full.length, sample: full.substring(0, 80) });
  } catch (err) {
    const msg = err && err.message ? err.message : String(err);
    const stack = err && err.stack ? err.stack.toString().substring(0, 300) : '';
    setStatus('ERR: ' + msg);
    log({ kind: 'error', message: msg, stack });
  }
})();
</script>
</body>
</html>
