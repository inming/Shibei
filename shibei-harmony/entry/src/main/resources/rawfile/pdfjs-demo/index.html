<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font: 14px -apple-system, sans-serif; padding: 8px; }
  pre { max-height: 50vh; overflow: auto; background: #f0f0f0; padding: 8px; font-size: 11px; }
  canvas { width: 100%; border: 1px solid #ccc; }
</style>
</head>
<body>
<h3>pdfjs-dist Demo</h3>
<div id="status">loading…</div>
<canvas id="page"></canvas>
<h4>Extracted text (streamTextContent):</h4>
<pre id="text">—</pre>

<!--
  Probe 1: non-module script to confirm inline script executes at all.
  If host logs "A: inline script" we know basic JS runs.
-->
<script>
(function() {
  var host = window.shibeiHost;
  if (host) host.onEvent(JSON.stringify({ kind: 'probe', step: 'A: inline script' }));
  var s = document.getElementById('status');
  if (s) s.textContent = 'A: inline script ran';
})();
</script>

<!--
  Probe 2: ES module script. If host logs "B: module start" the ES-module
  loader works. If this never arrives, ArkWeb's module loader failed.
-->
<script type="module">
(function() {
  var host = window.shibeiHost;
  if (host) host.onEvent(JSON.stringify({ kind: 'probe', step: 'B: module start' }));
  document.getElementById('status').textContent = 'B: module start';
})();
</script>

<!--
  Probe 3: dynamic import of pdf.mjs. This defers fatal failures to a
  Promise rejection we can catch rather than silently halting module
  evaluation (which is what happens on a static import resolution error).
-->
<script type="module">
(async function() {
  var host = window.shibeiHost;
  function log(o) { if (host) host.onEvent(JSON.stringify(o)); console.log(o); }
  function setStatus(s) { document.getElementById('status').textContent = s; }

  log({ kind: 'probe', step: 'C: about to import pdf.mjs' });
  setStatus('C: importing pdf.mjs');

  let pdfjs;
  try {
    pdfjs = await import('./pdf.mjs');
    log({ kind: 'probe', step: 'D: pdf.mjs imported', keys: Object.keys(pdfjs).slice(0, 10) });
    setStatus('D: pdf.mjs imported');
  } catch (err) {
    const msg = err && err.message ? err.message : String(err);
    log({ kind: 'error', step: 'C', message: msg });
    setStatus('ERR at C: ' + msg);
    return;
  }

  try {
    pdfjs.GlobalWorkerOptions.workerSrc = './pdf.worker.mjs';
    log({ kind: 'probe', step: 'E: workerSrc set' });
    setStatus('E: workerSrc set');

    const task = pdfjs.getDocument('./sample.pdf');
    log({ kind: 'probe', step: 'F: getDocument task created' });
    setStatus('F: waiting for doc');

    const pdf = await task.promise;
    log({ kind: 'probe', step: 'G: pdf loaded', pages: pdf.numPages });
    setStatus('G: pdf loaded, pages=' + pdf.numPages);

    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 1.0 });
    const canvas = document.getElementById('page');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    log({ kind: 'probe', step: 'H: page rendered', w: viewport.width, h: viewport.height });
    setStatus('H: rendered, extracting text...');

    const textStream = page.streamTextContent({ includeMarkedContent: false });
    const reader = textStream.getReader();
    const pieces = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      if (value && value.items) {
        for (const it of value.items) {
          if (typeof it.str === 'string') pieces.push(it.str);
        }
      }
    }
    const full = pieces.join(' ');
    document.getElementById('text').textContent = full || '(empty)';
    setStatus('extracted ' + full.length + ' chars');
    log({ kind: 'done', chars: full.length, sample: full.substring(0, 80) });
  } catch (err) {
    const msg = err && err.message ? err.message : String(err);
    log({ kind: 'error', step: 'post-import', message: msg });
    setStatus('ERR post-import: ' + msg);
  }
})();
</script>
</body>
</html>
