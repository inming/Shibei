<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font: 14px -apple-system, sans-serif; padding: 8px; }
  pre { max-height: 50vh; overflow: auto; background: #f0f0f0; padding: 8px; font-size: 11px; }
  canvas { width: 100%; border: 1px solid #ccc; }
</style>
</head>
<body>
<h3>pdfjs-dist Demo (IIFE bundle, worker disabled)</h3>
<div id="status">loading…</div>
<canvas id="page"></canvas>
<h4>Extracted text (streamTextContent):</h4>
<pre id="text">—</pre>

<!--
  ArkWeb rejects cross-file ES module imports (verified Mate X5 / HarmonyOS 6.1).
  pdf.mjs was bundled to an IIFE that exposes window.pdfjsLib, loaded via a
  classic script tag. Worker is disabled so pdfjs runs pdf.worker's logic on
  the main thread — fine for Phase 0's small fixture; production will need to
  decide whether to allow a worker (requires pre-packaging the worker too).
-->
<script src="./pdf-bundle.js"></script>
<script>
(async function() {
  var host = window.shibeiHost;
  function log(o) { if (host) host.onEvent(JSON.stringify(o)); console.log(o); }
  function setStatus(s) { document.getElementById('status').textContent = s; }

  try {
    setStatus('A: bundle loaded, pdfjsLib = ' + (typeof window.pdfjsLib));
    log({ kind: 'probe', step: 'A: bundle loaded', typeof_pdfjsLib: typeof window.pdfjsLib });
    var pdfjs = window.pdfjsLib;
    if (!pdfjs || !pdfjs.getDocument) {
      setStatus('ERR: pdfjsLib missing or incomplete');
      log({ kind: 'error', step: 'A', message: 'pdfjsLib missing' });
      return;
    }

    // Disable the web worker. pdfjs will run its worker logic on the main
    // thread. Avoids the cross-file fetch for pdf.worker.mjs that ArkWeb
    // doesn't allow.
    pdfjs.GlobalWorkerOptions.workerSrc = '';
    // Some pdfjs versions also honour this; set both for robustness.
    if (pdfjs.disableWorker !== undefined) pdfjs.disableWorker = true;
    setStatus('B: worker disabled');
    log({ kind: 'probe', step: 'B: worker disabled' });

    const task = pdfjs.getDocument({ url: './sample.pdf', disableWorker: true });
    setStatus('C: getDocument task created');
    log({ kind: 'probe', step: 'C: getDocument created' });

    const pdf = await task.promise;
    setStatus('D: pdf loaded, pages=' + pdf.numPages);
    log({ kind: 'probe', step: 'D: pdf loaded', pages: pdf.numPages });

    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 1.0 });
    const canvas = document.getElementById('page');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    setStatus('E: page rendered');
    log({ kind: 'probe', step: 'E: page rendered', w: viewport.width, h: viewport.height });

    const textStream = page.streamTextContent({ includeMarkedContent: false });
    const reader = textStream.getReader();
    const pieces = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      if (value && value.items) {
        for (const it of value.items) {
          if (typeof it.str === 'string') pieces.push(it.str);
        }
      }
    }
    const full = pieces.join(' ');
    document.getElementById('text').textContent = full || '(empty)';
    setStatus('extracted ' + full.length + ' chars');
    log({ kind: 'done', chars: full.length, sample: full.substring(0, 80) });
  } catch (err) {
    const msg = err && err.message ? err.message : String(err);
    const stack = err && err.stack ? err.stack.toString().substring(0, 300) : '';
    setStatus('ERR: ' + msg);
    log({ kind: 'error', message: msg, stack });
  }
})();
</script>
</body>
</html>
