<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font: 14px -apple-system, sans-serif; padding: 8px; }
  pre { max-height: 50vh; overflow: auto; background: #f0f0f0; padding: 8px; font-size: 11px; }
  canvas { width: 100%; border: 1px solid #ccc; }
</style>
</head>
<body>
<h3>pdfjs-dist Demo (IIFE bundle + Blob-URL worker)</h3>
<div id="status">loading…</div>
<canvas id="page"></canvas>
<h4>Extracted text (streamTextContent):</h4>
<pre id="text">—</pre>

<!--
  pdfjs v4 mandates GlobalWorkerOptions.workerSrc (or workerPort) — fake
  worker fallback was removed. We can't import pdf.worker.mjs via ES
  modules on ArkWeb (cross-file module imports fail). Workaround:
    1. pre-bundle pdf.worker.mjs to IIFE as pdf-worker-bundle.js
    2. fetch() it as text from file:// (classic fetch, not module loader)
    3. wrap in a Blob + Object URL, hand to pdfjs as workerSrc
  Blob URLs bypass both file:// and resource:// module restrictions.
-->
<script src="./pdf-bundle.js"></script>
<script>
(async function() {
  var host = window.shibeiHost;
  function log(o) { if (host) host.onEvent(JSON.stringify(o)); console.log(o); }
  function setStatus(s) { document.getElementById('status').textContent = s; }

  try {
    setStatus('A: bundle loaded');
    log({ kind: 'probe', step: 'A: bundle loaded', typeof_pdfjsLib: typeof window.pdfjsLib });
    var pdfjs = window.pdfjsLib;
    if (!pdfjs || !pdfjs.getDocument) {
      setStatus('ERR: pdfjsLib missing');
      log({ kind: 'error', step: 'A', message: 'pdfjsLib missing' });
      return;
    }

    setStatus('B: fetching worker bundle');
    log({ kind: 'probe', step: 'B: fetching worker bundle' });
    const wRes = await fetch('./pdf-worker-bundle.js');
    if (!wRes.ok) {
      throw new Error('worker fetch failed: ' + wRes.status + ' ' + wRes.statusText);
    }
    const wCode = await wRes.text();
    log({ kind: 'probe', step: 'C: worker bundle fetched', bytes: wCode.length });

    const wBlob = new Blob([wCode], { type: 'application/javascript' });
    const wUrl = URL.createObjectURL(wBlob);
    pdfjs.GlobalWorkerOptions.workerSrc = wUrl;
    setStatus('D: workerSrc set to blob URL');
    log({ kind: 'probe', step: 'D: workerSrc set', workerUrl: wUrl.substring(0, 40) });

    const task = pdfjs.getDocument({ url: './sample.pdf' });
    setStatus('E: getDocument task created');
    log({ kind: 'probe', step: 'E: getDocument created' });

    const pdf = await task.promise;
    setStatus('F: pdf loaded, pages=' + pdf.numPages);
    log({ kind: 'probe', step: 'F: pdf loaded', pages: pdf.numPages });

    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 1.0 });
    const canvas = document.getElementById('page');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    setStatus('G: page rendered');
    log({ kind: 'probe', step: 'G: page rendered', w: viewport.width, h: viewport.height });

    const textStream = page.streamTextContent({ includeMarkedContent: false });
    const reader = textStream.getReader();
    const pieces = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      if (value && value.items) {
        for (const it of value.items) {
          if (typeof it.str === 'string') pieces.push(it.str);
        }
      }
    }
    const full = pieces.join(' ');
    document.getElementById('text').textContent = full || '(empty)';
    setStatus('extracted ' + full.length + ' chars');
    log({ kind: 'done', chars: full.length, sample: full.substring(0, 80) });
  } catch (err) {
    const msg = err && err.message ? err.message : String(err);
    const stack = err && err.stack ? err.stack.toString().substring(0, 300) : '';
    setStatus('ERR: ' + msg);
    log({ kind: 'error', message: msg, stack });
  }
})();
</script>
</body>
</html>
